plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.vitalis.vitalis"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // flutter_local_notifications uses java.time APIs → requires desugaring.
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.vitalis.vitalis"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 26  // Required by Health Connect
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // AppAuth OAuth redirect scheme (Entra External ID sign-in callback).
        // Unique to this app (package name) so no other app (e.g. Microsoft
        // Authenticator, which claims `msauth`) can intercept the callback.
        manifestPlaceholders += [appAuthRedirectScheme: 'com.vitalis.vitalis']
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Release builds use a stable private key so Firebase-distributed
            // builds can update the installed app without another uninstall.
            signingConfig = signingConfigs.release
            // flutter_appauth (net.openid.appauth) ships no consumer ProGuard
            // rules; R8 was stripping its classes and crashing the release app
            // on launch. Disable shrinking to keep all auth classes intact.
            minifyEnabled false
            shrinkResources false
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def needsReleaseSigning = graph.allTasks.any {
        it.name.toLowerCase().contains('release')
    }
    if (needsReleaseSigning && !keystorePropertiesFile.exists()) {
        throw new GradleException(
            "Missing android/key.properties. " +
            "Create the private release signing files before building release."
        )
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
