allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def externalBuildDir = System.getenv("VITALIS_ANDROID_BUILD_DIR")
rootProject.buildDir = externalBuildDir ?: "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
